name: Deploy to Cloud Run

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-west2-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          docker build -t us-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/github/${{ secrets.STAGING_SERVICE_NAME }}:latest .
          docker push us-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/github/${{ secrets.STAGING_SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ secrets.STAGING_SERVICE_NAME }} \
            --image us-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/github/${{ secrets.STAGING_SERVICE_NAME }}:latest \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --port 3001 \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production,SUPABASE_URL=${SUPABASE_URL},SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY},SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY},JWT_SECRET=${JWT_SECRET},ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY},ANTHROPIC_MODEL=${ANTHROPIC_MODEL},FRONTEND_URL=${FRONTEND_URL},ESTIMATE_PREFIX=${ESTIMATE_PREFIX},TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID},TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN},TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER},SENDGRID_API_KEY=${SENDGRID_API_KEY},SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --timeout 600s \
            --min-instances 0 \
            --max-instances 10

        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          ESTIMATE_PREFIX: ${{ vars.ESTIMATE_PREFIX }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
