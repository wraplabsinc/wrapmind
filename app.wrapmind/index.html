<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Vehicle wrap package pricing calculator for wrap shops" />
    <!--
      Content Security Policy — restricts resource origins to mitigate XSS.
      'unsafe-inline' is required by React + Vite (inline scripts/styles in dev).
      Tighten for production by removing 'unsafe-inline' and using nonces/hashes.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src  'self' 'unsafe-inline' 'unsafe-eval';
      style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src    'self' https://fonts.gstatic.com;
      img-src     'self' data: blob: https:;
      media-src   'self' blob: https://storage.googleapis.com;
      connect-src 'self'
        https://api.anthropic.com
        https://*.supabase.co
        wss://*.supabase.co
        https://storage.googleapis.com
        https://*.ingest.sentry.io;
      frame-src   'none';
      object-src  'none';
      base-uri    'self';
      form-action 'self';
    " />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <title>WrapMind Estimator</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
